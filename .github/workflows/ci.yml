name: CI
on:
  push:
    paths:
      - src/**
      - tests/**
      - .github/workflows/ci.yml

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
      - name: Super-Linter
        uses: super-linter/super-linter@v8.1.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VALIDATE_CSHARP: true
          VALIDATE_DOCKERFILE_HADOLINT: true
          VALIDATE_GITLEAKS: true
  build-csharp:
    name: Build C#
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
      - name: Cache
        id: cache
        uses: actions/cache@v4.2.4
        with:
          path: |
            ~/.nuget/packages
            **/obj
          key: dotnet-${{ hashFiles('**/*.csproj') }}
          restore-keys: dotnet-
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.0.0
        with:
          dotnet-version: 9.0.x
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore --nologo
  
  test-csharp-unit:
    needs: build-csharp
    name: Test C# (Unit)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
      - name: Cache
        id: cache
        uses: actions/cache@v4.2.4
        with:
          path: |
            ~/.nuget/packages
            **/obj
          key: dotnet-${{ hashFiles('**/*.csproj') }}
          restore-keys: dotnet-
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.0.0
        with:
          dotnet-version: 9.0.x
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: dotnet restore
      - name: Test
        run: dotnet test --nologo --configuration Release --no-restore tests/Software.Unit/Software.Unit.csproj
