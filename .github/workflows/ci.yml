  build-docker-middleware:
    needs: build-csharp
    name: Build Docker Middleware
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.11.1
      - name: Build and push Docker images
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: src/Software/Software.Middleware/Dockerfile
          push: false
          tags: streamer-bot-cloud-middleware:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
