name: CD (Stage)
on:
  push:
    branches:
      - main
    paths:
      - src/**
      - Kubernetes/**
      - .github/workflows/cd.stage.yml

concurrency:
  group: cd-stage
  cancel-in-progress: true

jobs:
  docker-middleware:
    name: Deploy Docker Middleware
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: Docker Login
        uses: docker/login-action@v3.5.0
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.11.1
      - name: Build and push Docker images
        uses: docker/build-push-action@v6.18.0
        with:
          push: true
          context: .
          file: src/Software/Software.Middleware/Dockerfile
          tags: registry.digitalocean.com/saveapis/streamer-bot-cloud-middleware:${{ github.sha }}
          secrets: |
            hangfire_ace_url=${{ secrets.HANGFIRE_ACE_URL }}
            hangfire_ace_username=${{ secrets.HANGFIRE_ACE_USER }}
            hangfire_ace_token=${{ secrets.HANGFIRE_ACE_TOKEN }}
            hangfire_pro_url=${{ secrets.HANGFIRE_PRO_URL }}
            hangfire_pro_username=${{ secrets.HANGFIRE_PRO_USER }}
            hangfire_pro_token=${{ secrets.HANGFIRE_PRO_TOKEN }}
  docker-event-twitch:
    name: Deploy Docker Event (Twitch)
