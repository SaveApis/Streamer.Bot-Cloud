      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.11.1
      - name: Build and push Docker images
        uses: docker/build-push-action@v6.18.0
        with:
          push: true
          context: .
          file: src/Software/Bot/Software.Bot.YouTube/Dockerfile
          tags: registry.digitalocean.com/saveapis/streamer-bot-cloud-bot-youtube:${{ github.sha }}
          secrets: |
            hangfire_ace_url=${{ secrets.HANGFIRE_ACE_URL }}
            hangfire_ace_username=${{ secrets.HANGFIRE_ACE_USER }}
            hangfire_ace_token=${{ secrets.HANGFIRE_ACE_TOKEN }}
            hangfire_pro_url=${{ secrets.HANGFIRE_PRO_URL }}
            hangfire_pro_username=${{ secrets.HANGFIRE_PRO_USER }}
            hangfire_pro_token=${{ secrets.HANGFIRE_PRO_TOKEN }}
  kubernetes:
    needs:
      - docker-middleware
      - docker-event-twitch
      - docker-event-discord
      - docker-event-youtube
      - docker-bot-twitch
      - docker-bot-discord
      - docker-bot-youtube
    name: Deploy Kubernetes
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: Install doctl
        uses: digitalocean/action-doctl@v2.5.1
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}
      - name: Checkout kubernetes config
        run: doctl kubernetes cluster kubeconfig save saveapis
      - name: Replace Variables
        run: |
          find Kubernetes/ -type f -name '*.yaml' -exec sed -i.bak \
            -e 's|%ENVIRONMENT%|staging|g' \
            -e 's|%INGRESS_HOST%|staging.streamer-bot-cloud.saveapis.de|g' \
            -e 's|%VERSION%|${{ github.sha }}|g' \
            -e 's|%VALKEY_HOST%|${{ secrets.VALKEY_HOST }}|g' \
            -e 's|%VALKEY_PORT%|${{ secrets.VALKEY_PORT }}|g' \
            -e 's|%VALKEY_USERNAME%|${{ secrets.VALKEY_USERNAME }}|g' \
            -e 's|%VALKEY_PASSWORD%|${{ secrets.VALKEY_PASSWORD }}|g' {} +
      - name: Find changed files
        run: find Kubernetes/ -type f -name '*.yaml.bak'
      - name: Deploy to kubernetes
        run: kubectl apply -k Kubernetes/
      - name: Verify Deployment (Middleware)
        run: kubectl rollout status deployment/middleware-backend -n streamer-bot-cloud-staging
      - name: Verify Deployment (Event Twitch)
        run: kubectl rollout status deployment/event-twitch-backend -n streamer-bot-cloud-staging
      - name: Verify Deployment (Event Discord)
        run: kubectl rollout status deployment/event-discord-backend -n streamer-bot-cloud-staging
      - name: Verify Deployment (Event YouTube)
        run: kubectl rollout status deployment/event-youtube-backend -n streamer-bot-cloud-staging
      - name: Verify Deployment (Bot Twitch)
        run: kubectl rollout status deployment/bot-twitch-backend -n streamer-bot-cloud-staging
      - name: Verify Deployment (Bot Discord)
        run: kubectl rollout status deployment/bot-discord-backend -n streamer-bot-cloud-staging
      - name: Verify Deployment (Bot YouTube)
        run: kubectl rollout status deployment/bot-youtube-backend -n streamer-bot-cloud-staging