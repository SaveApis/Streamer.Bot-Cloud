name: CD (Production)
on:
  push:
    branches:
      - main
    paths:
      - CHANGELOG.md

concurrency:
  group: cd-production
  cancel-in-progress: true

jobs:
  read-version:
    outputs:
      version: ${{ steps.read_version.outputs.version }}
    name: Read version
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.0.0
        with:
          dotnet-version: 9.0.x
      - name: Restore .NET Tools
        run: dotnet tool restore
      - name: Read version
        id: read_version
        run: echo "version=$(dotnet versionize inspect)" >> $GITHUB_OUTPUT
  docker-middleware:
    needs: read-version
    name: Deploy Docker Middleware
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: Docker Login
        uses: docker/login-action@v3.5.0
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.11.1
      - name: Build and push Docker images
        uses: docker/build-push-action@v6.18.0
        with:
          push: true
          context: .
          file: src/Software/Software.Middleware/Dockerfile
          tags: registry.digitalocean.com/saveapis/streamer-bot-cloud-middleware:${{ needs.read-version.outputs.version }}
          secrets: |
            hangfire_ace_url=${{ secrets.HANGFIRE_ACE_URL }}
            hangfire_ace_user=${{ secrets.HANGFIRE_ACE_USER }}
            hangfire_ace_password=${{ secrets.HANGFIRE_ACE_TOKEN }}
            hangfire_pro_url=${{ secrets.HANGFIRE_PRO_URL }}
            hangfire_pro_user=${{ secrets.HANGFIRE_PRO_USER }}
            hangfire_pro_password=${{ secrets.HANGFIRE_PRO_TOKEN }}
  docker-event-twitch:
    needs: read-version
    name: Deploy Docker Event (Twitch)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: Docker Login
        uses: docker/login-action@v3.5.0
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.11.1
      - name: Build and push Docker images
        uses: docker/build-push-action@v6.18.0
        with:
          push: true
          context: .
          file: src/Software/Event/Software.Event.Twitch/Dockerfile
          tags: registry.digitalocean.com/saveapis/streamer-bot-cloud-event-twitch:${{ needs.read-version.outputs.version }}
          secrets: |
            hangfire_ace_url=${{ secrets.HANGFIRE_ACE_URL }}
            hangfire_ace_user=${{ secrets.HANGFIRE_ACE_USER }}
            hangfire_ace_password=${{ secrets.HANGFIRE_ACE_TOKEN }}
            hangfire_pro_url=${{ secrets.HANGFIRE_PRO_URL }}
            hangfire_pro_user=${{ secrets.HANGFIRE_PRO_USER }}
            hangfire_pro_password=${{ secrets.HANGFIRE_PRO_TOKEN }}
  docker-event-discord:
    needs: read-version
    name: Deploy Docker Event (Discord)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: Docker Login
