      - name: Build and push Docker images
        uses: docker/build-push-action@v6.18.0
        with:
          push: true
          context: .
          file: src/Software/Bot/Software.Bot.Discord/Dockerfile
          tags: registry.digitalocean.com/saveapis/streamer-bot-cloud-bot-discord:${{ needs.read-version.outputs.version }}
          secrets: |
            hangfire_ace_url=${{ secrets.HANGFIRE_ACE_URL }}
            hangfire_ace_user=${{ secrets.HANGFIRE_ACE_USER }}
            hangfire_ace_password=${{ secrets.HANGFIRE_ACE_TOKEN }}
            hangfire_pro_url=${{ secrets.HANGFIRE_PRO_URL }}
            hangfire_pro_user=${{ secrets.HANGFIRE_PRO_USER }}
            hangfire_pro_password=${{ secrets.HANGFIRE_PRO_TOKEN }}
  docker-bot-youtube:
    needs: read-version
    name: Deploy Docker Bot (YouTube)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: Docker Login
        uses: docker/login-action@v3.5.0
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.11.1
      - name: Build and push Docker images
        uses: docker/build-push-action@v6.18.0
        with:
          push: true
          context: .
          file: src/Software/Bot/Software.Bot.YouTube/Dockerfile
          tags: registry.digitalocean.com/saveapis/streamer-bot-cloud-bot-youtube:${{ needs.read-version.outputs.version }}
          secrets: |
            hangfire_ace_url=${{ secrets.HANGFIRE_ACE_URL }}
            hangfire_ace_user=${{ secrets.HANGFIRE_ACE_USER }}
            hangfire_ace_password=${{ secrets.HANGFIRE_ACE_TOKEN }}
            hangfire_pro_url=${{ secrets.HANGFIRE_PRO_URL }}
            hangfire_pro_user=${{ secrets.HANGFIRE_PRO_USER }}
            hangfire_pro_password=${{ secrets.HANGFIRE_PRO_TOKEN }}
  kubernetes:
    needs:
      - read-version
      - docker-middleware
      - docker-event-twitch
      - docker-event-discord
      - docker-event-youtube
      - docker-bot-twitch
      - docker-bot-discord
      - docker-bot-youtube
    name: Deploy Kubernetes
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: Install doctl
        uses: digitalocean/action-doctl@v2.5.1
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}
      - name: Checkout kubernetes config
        run: doctl kubernetes cluster kubeconfig save saveapis
      - name: Replace Variables
        run: |
          find Kubernetes/ -type f -name '*.yaml' -exec sed -i.bak \
            -e 's|%ENVIRONMENT%|production|g' \
            -e 's|%INGRESS_HOST%|streamer-bot-cloud.saveapis.de|g' \
            -e 's|%VALKEY_HOST%|${{ secrets.VALKEY_HOST }}|g' \
            -e 's|%VALKEY_PORT%|${{ secrets.VALKEY_PORT }}|g' \
            -e 's|%VALKEY_USERNAME%|${{ secrets.VALKEY_USERNAME }}|g' \
            -e 's|%VALKEY_PASSWORD%|${{ secrets.VALKEY_PASSWORD }}|g' \
            -e 's|%MYSQL_HOST%|${{ secrets.MYSQL_HOST }}|g' \
            -e 's|%MYSQL_PORT%|${{ secrets.MYSQL_PORT }}|g' \
            -e 's|%MYSQL_USERNAME%|${{ secrets.MYSQL_USERNAME }}|g' \
            -e 's|%MYSQL_PASSWORD%|${{ secrets.MYSQL_PASSWORD }}|g' \
            -e 's|%MYSQL_MIDDLEWARE_DATABASE%|streamer-bot-cloud-middleware|g' \
            -e 's|%APPLICATIONS_FRONTEND_AUTH_ID%|${{ secrets.PROD_APPLICATIONS_FRONTEND_AUTH_ID }}|g' \
            -e 's|%APPLICATIONS_FRONTEND_AUTH_SECRET%|${{ secrets.PROD_APPLICATIONS_FRONTEND_AUTH_SECRET }}|g' \
            -e 's|%APPLICATIONS_MIDDLEWARE_AUTH_ID%|${{ secrets.PROD_APPLICATIONS_MIDDLEWARE_AUTH_ID }}|g' \
            -e 's|%APPLICATIONS_MIDDLEWARE_AUTH_SECRET%|${{ secrets.PROD_APPLICATIONS_MIDDLEWARE_AUTH_SECRET }}|g' \
            -e 's|%APPLICATIONS_EVENT_TWITCH_AUTH_ID%|${{ secrets.PROD_APPLICATIONS_EVENT_TWITCH_AUTH_ID }}|g' \
            -e 's|%APPLICATIONS_EVENT_TWITCH_AUTH_SECRET%|${{ secrets.PROD_APPLICATIONS_EVENT_TWITCH_AUTH_SECRET }}|g' \
            -e 's|%APPLICATIONS_EVENT_DISCORD_AUTH_ID%|${{ secrets.PROD_APPLICATIONS_EVENT_DISCORD_AUTH_ID }}|g' \
            -e 's|%APPLICATIONS_EVENT_DISCORD_AUTH_SECRET%|${{ secrets.PROD_APPLICATIONS_EVENT_DISCORD_AUTH_SECRET }}|g' \
            -e 's|%APPLICATIONS_EVENT_YOUTUBE_AUTH_ID%|${{ secrets.PROD_APPLICATIONS_EVENT_YOUTUBE_AUTH_ID }}|g' \
            -e 's|%APPLICATIONS_EVENT_YOUTUBE_AUTH_SECRET%|${{ secrets.PROD_APPLICATIONS_EVENT_YOUTUBE_AUTH_SECRET }}|g' \
            -e 's|%APPLICATIONS_BOT_TWITCH_AUTH_ID%|${{ secrets.PROD_APPLICATIONS_BOT_TWITCH_AUTH_ID }}|g' \
            -e 's|%APPLICATIONS_BOT_TWITCH_AUTH_SECRET%|${{ secrets.PROD_APPLICATIONS_BOT_TWITCH_AUTH_SECRET }}|g' \
            -e 's|%APPLICATIONS_BOT_DISCORD_AUTH_ID%|${{ secrets.PROD_APPLICATIONS_BOT_DISCORD_AUTH_ID }}|g' \
            -e 's|%APPLICATIONS_BOT_DISCORD_AUTH_SECRET%|${{ secrets.PROD_APPLICATIONS_BOT_DISCORD_AUTH_SECRET }}|g' \
            -e 's|%APPLICATIONS_BOT_YOUTUBE_AUTH_ID%|${{ secrets.PROD_APPLICATIONS_BOT_YOUTUBE_AUTH_ID }}|g' \
            -e 's|%APPLICATIONS_BOT_YOUTUBE_AUTH_SECRET%|${{ secrets.PROD_APPLICATIONS_BOT_YOUTUBE_AUTH_SECRET }}|g' \
            -e 's|%ENCRYPTION_MIDDLEWARE_KEY%|${{ secrets.PROD_ENCRYPTION_MIDDLEWARE_KEY }}|g' \
            -e 's|%ENCRYPTION_EVENT_TWITCH_KEY%|${{ secrets.PROD_ENCRYPTION_EVENT_TWITCH_KEY }}|g' \
            -e 's|%ENCRYPTION_EVENT_DISCORD_KEY%|${{ secrets.PROD_ENCRYPTION_EVENT_DISCORD_KEY }}|g' \
            -e 's|%ENCRYPTION_EVENT_YOUTUBE_KEY%|${{ secrets.PROD_ENCRYPTION_EVENT_YOUTUBE_KEY }}|g' \
            -e 's|%ENCRYPTION_BOT_TWITCH_KEY%|${{ secrets.PROD_ENCRYPTION_BOT_TWITCH_KEY }}|g' \
            -e 's|%ENCRYPTION_BOT_DISCORD_KEY%|${{ secrets.PROD_ENCRYPTION_BOT_DISCORD_KEY }}|g' \
            -e 's|%ENCRYPTION_BOT_YOUTUBE_KEY%|${{ secrets.PROD_ENCRYPTION_BOT_YOUTUBE_KEY }}|g' \
            -e 's|%JWT_MIDDLEWARE_SIGNING_KEY%|${{ secrets.PROD_JWT_MIDDLEWARE_SIGNING_KEY }}|g' \
            -e 's|%JWT_MIDDLEWARE_ISSUER_AUDIENCE%|${{ secrets.PROD_JWT_MIDDLEWARE_ISSUER_AUDIENCE }}|g' \
            -e 's|%JWT_EVENT_TWITCH_SIGNING_KEY%|${{ secrets.PROD_JWT_EVENT_TWITCH_SIGNING_KEY }}|g' \
            -e 's|%JWT_EVENT_TWITCH_ISSUER_AUDIENCE%|${{ secrets.PROD_JWT_EVENT_TWITCH_ISSUER_AUDIENCE }}|g' \
            -e 's|%JWT_EVENT_DISCORD_SIGNING_KEY%|${{ secrets.PROD_JWT_EVENT_DISCORD_SIGNING_KEY }}|g' \
            -e 's|%JWT_EVENT_DISCORD_ISSUER_AUDIENCE%|${{ secrets.PROD_JWT_EVENT_DISCORD_ISSUER_AUDIENCE }}|g' \
            -e 's|%JWT_EVENT_YOUTUBE_SIGNING_KEY%|${{ secrets.PROD_JWT_EVENT_YOUTUBE_SIGNING_KEY }}|g' \
            -e 's|%JWT_EVENT_YOUTUBE_ISSUER_AUDIENCE%|${{ secrets.PROD_JWT_EVENT_YOUTUBE_ISSUER_AUDIENCE }}|g' \
            -e 's|%JWT_BOT_TWITCH_SIGNING_KEY%|${{ secrets.PROD_JWT_BOT_TWITCH_SIGNING_KEY }}|g' \
            -e 's|%JWT_BOT_TWITCH_ISSUER_AUDIENCE%|${{ secrets.PROD_JWT_BOT_TWITCH_ISSUER_AUDIENCE }}|g' \
            -e 's|%JWT_BOT_DISCORD_SIGNING_KEY%|${{ secrets.PROD_JWT_BOT_DISCORD_SIGNING_KEY }}|g' \
            -e 's|%JWT_BOT_DISCORD_ISSUER_AUDIENCE%|${{ secrets.PROD_JWT_BOT_DISCORD_ISSUER_AUDIENCE }}|g' \
            -e 's|%JWT_BOT_YOUTUBE_SIGNING_KEY%|${{ secrets.PROD_JWT_BOT_YOUTUBE_SIGNING_KEY }}|g' \
            -e 's|%JWT_BOT_YOUTUBE_ISSUER_AUDIENCE%|${{ secrets.PROD_JWT_BOT_YOUTUBE_ISSUER_AUDIENCE }}|g' \
            -e 's|%VERSION%|${{ needs.read-version.outputs.version }}|g' {} +
      - name: Find changed files
        run: find Kubernetes/ -type f -name '*.yaml.bak'
      - name: Deploy to kubernetes
        run: kubectl apply -k Kubernetes/
      - name: Verify Deployment (Middleware)
        run: kubectl rollout status deployment/middleware -n streamer-bot-cloud-production
      - name: Verify Deployment (Event Twitch)
        run: kubectl rollout status deployment/event-twitch -n streamer-bot-cloud-production
      - name: Verify Deployment (Event Discord)
        run: kubectl rollout status deployment/event-discord -n streamer-bot-cloud-production
      - name: Verify Deployment (Event YouTube)
        run: kubectl rollout status deployment/event-youtube -n streamer-bot-cloud-production
      - name: Verify Deployment (Bot Twitch)
        run: kubectl rollout status deployment/bot-twitch -n streamer-bot-cloud-production
      - name: Verify Deployment (Bot Discord)
        run: kubectl rollout status deployment/bot-discord -n streamer-bot-cloud-production
      - name: Verify Deployment (Bot YouTube)
        run: kubectl rollout status deployment/bot-youtube -n streamer-bot-cloud-production