        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.11.1
      - name: Build and push Docker images
        uses: docker/build-push-action@v6.18.0
        with:
          push: true
          context: .
          file: src/Software/Event/Software.Event.YouTube/Dockerfile
          tags: registry.digitalocean.com/saveapis/streamer-bot-cloud-event-youtube:${{ needs.read-version.outputs.version }}
          secrets: |
            hangfire_ace_url=${{ secrets.HANGFIRE_ACE_URL }}
            hangfire_ace_user=${{ secrets.HANGFIRE_ACE_USER }}
            hangfire_ace_password=${{ secrets.HANGFIRE_ACE_TOKEN }}
            hangfire_pro_url=${{ secrets.HANGFIRE_PRO_URL }}
            hangfire_pro_user=${{ secrets.HANGFIRE_PRO_USER }}
            hangfire_pro_password=${{ secrets.HANGFIRE_PRO_TOKEN }}
  docker-bot-twitch:
    needs: read-version
    name: Deploy Docker Bot (Twitch)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: Docker Login
        uses: docker/login-action@v3.5.0
        with:
          registry: registry.digitalocean.com
