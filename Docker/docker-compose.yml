services:
  middleware-backend:
    depends_on:
      valkey:
        condition: service_healthy
    hostname: middleware-backend
    container_name: middleware-backend
    image: streamer-bot-cloud-middleware:dev
    build:
      context: ..
      dockerfile: src/Software/Software.Middleware/Dockerfile
    environment:
      application_type: backend
    ports:
      - "5000:8080"
  middleware-server:
    depends_on:
      valkey:
        condition: service_healthy
    hostname: middleware-server
    container_name: middleware-server
    image: streamer-bot-cloud-middleware:dev
    build:
      context: ..
      dockerfile: src/Software/Software.Middleware/Dockerfile
    environment:
      application_type: server
  middleware-worker:
    depends_on:
      valkey:
        condition: service_healthy
      event-twitch-backend:
        condition: service_started
      event-discord-backend:
        condition: service_started
      event-youtube-backend:
        condition: service_started
      bot-twitch-backend:
        condition: service_started
      bot-discord-backend:
        condition: service_started
      bot-youtube-backend:
        condition: service_started
    hostname: middleware-worker
    container_name: middleware-worker
    image: streamer-bot-cloud-middleware:dev
    build:
      context: ..
      dockerfile: src/Software/Software.Middleware/Dockerfile
    environment:
      application_type: worker
  event-twitch-backend:
    depends_on:
      valkey:
        condition: service_healthy
      middleware-backend:
        condition: service_started
    hostname: event-twitch-backend
    container_name: event-twitch-backend
    image: streamer-bot-cloud-event-twitch:dev
    build:
      context: ..
      dockerfile: src/Software/Event/Software.Event.Twitch/Dockerfile
    environment:
      application_type: backend
    ports:
      - "6000:8080"
  event-twitch-server:
