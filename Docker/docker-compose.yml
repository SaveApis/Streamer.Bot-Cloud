  valkey:
    hostname: valkey
    container_name: valkey
    image: valkey/valkey:8.1.3-alpine
    volumes:
      - valkey-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 1s
      timeout: 5s
      retries: 30

volumes:
  valkey-data: