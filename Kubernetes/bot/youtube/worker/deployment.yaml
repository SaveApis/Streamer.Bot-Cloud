apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-youtube-worker
  labels:
    organization: saveapis
    project: streamer.bot-cloud
    app: bot-youtube
    type: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      organization: saveapis
      project: streamer.bot-cloud
      app: bot-youtube
      type: worker
  template:
    metadata:
      name: bot-youtube-worker
      labels:
        organization: saveapis
        project: streamer.bot-cloud
        app: bot-youtube
        type: worker
    spec:
      initContainers:
        - name: wait-for-middleware
          image: busybox:1.37.0
          command: [ 'sh', '-c', 'until nc -z -v -w30 middleware.streamer-bot-cloud-%ENVIRONMENT%.svc.cluster.local 8080; do echo "Waiting for middleware..."; sleep 5; done;' ]
      containers:
        - name: bot-youtube-worker
          image: registry.digitalocean.com/saveapis/streamer-bot-cloud-bot-youtube:%VERSION%
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: aspnetcore_environment
              valueFrom:
                configMapKeyRef:
                  name: core
                  key: environment
                  optional: false
            - name: application_type
              value: worker
            - name: Hangfire__Redis__Host
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: host
                  optional: false
            - name: Hangfire__Redis__Port
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: port
                  optional: false
            - name: Hangfire__Redis__UserName
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: username
                  optional: false
            - name: Hangfire__Redis__Password
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: password
                  optional: false
      restartPolicy: Always
      