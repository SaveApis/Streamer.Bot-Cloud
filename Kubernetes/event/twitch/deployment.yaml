apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-twitch
  labels:
    organization: saveapis
    project: streamer.event-cloud
    app: event-twitch
spec:
  replicas: 1
  selector:
    matchLabels:
      organization: saveapis
      project: streamer.event-cloud
      app: event-twitch
  template:
    metadata:
      name: event-twitch
      labels:
        organization: saveapis
        project: streamer.event-cloud
        app: event-twitch
    spec:
      initContainers:
        - name: wait-for-middleware
          image: busybox:1.37.0
          command: [ 'sh', '-c', 'until nc -z -v -w30 middleware.streamer-bot-cloud-%ENVIRONMENT%.svc.cluster.local 8080; do echo "Waiting for middleware..."; sleep 5; done;' ]
      containers:
        - name: event-twitch
          image: registry.digitalocean.com/saveapis/streamer-bot-cloud-event-twitch:%VERSION%
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: aspnetcore_environment
              valueFrom:
                configMapKeyRef:
                  name: core
                  key: environment
                  optional: false
            - name: Hangfire__Redis__Host
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: host
                  optional: false
            - name: Hangfire__Redis__Port
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: port
                  optional: false
            - name: Hangfire__Redis__UserName
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: username
                  optional: false
            - name: Hangfire__Redis__Password
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: password
                  optional: false
            - name: Hangfire__Redis__UseSsl
              value: "true"
            - name: Hangfire__Redis__Prefix
              value: "%ENVIRONMENT%:hangfire:event:twitch:"
            - name: Hangfire__Dashboard__PrefixPath
              value: "/api/event/twitch"
            - name: Encryption__Key
              valueFrom:
                secretKeyRef:
                  name: encryption
                  key: event-twitch
                  optional: false
      restartPolicy: Always
      