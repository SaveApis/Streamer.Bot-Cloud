apiVersion: apps/v1
kind: Deployment
metadata:
  name: middleware-backend
  labels:
    organization: saveapis
    project: streamer.bot-cloud
    app: middleware
    type: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      organization: saveapis
      project: streamer.bot-cloud
      app: middleware
      type: backend
  template:
    metadata:
      name: middleware-backend
      labels:
        organization: saveapis
        project: streamer.bot-cloud
        app: middleware
        type: backend
    spec:
      containers:
        - name: middleware-backend
          image: registry.digitalocean.com/saveapis/streamer-bot-cloud-middleware:%VERSION%
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: aspnetcore_environment
              valueFrom:
                configMapKeyRef:
                  name: core
                  key: environment
                  optional: false
            - name: application_type
              value: backend
            - name: Hangfire__Redis__Host
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: host
                  optional: false
            - name: Hangfire__Redis__Port
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: port
                  optional: false
            - name: Hangfire__Redis__UserName
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: username
                  optional: false
            - name: Hangfire__Redis__Password
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: password
                  optional: false
      restartPolicy: Always
      